<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Engineering - ET Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
        }

        header {
            background-color: #1a365d;
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: bold;
            color: #4299e1;
            text-decoration: none;
        }

        .back-btn {
            background-color: #4299e1;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .back-btn:hover {
            background-color: #3182ce;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h1 {
            color: #1a365d;
            margin-bottom: 20px;
            border-bottom: 3px solid #4299e1;
            padding-bottom: 10px;
        }

        .lesson-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .lesson-card h2 {
            color: #2b6cb0;
            margin-bottom: 15px;
        }

        .lesson-card p {
            margin-bottom: 15px;
            color: #4a5568;
        }

        .video-box {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 6px;
            margin-top: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">ET HUB</a>
        <a href="index.html" class="back-btn">&larr; මුල් පිටුවට</a>
    </header>

    <div class="container">
        <h1>Civil Engineering (සිවිල් ඉංජිනේරු විද්‍යාව)</h1>
        
        <div class="lesson-card">
            <h2>1. PASS PEPER CIVIL (Land Surveying)</h2>
            <div class="video-box">
                <iframe src=""https://www.youtube.com/embed/D02VQbT-a0Q?si=LpWXOO5EBoHyqAA1" " allowfullscreen></iframe>
            </div>
        </div>

        <div class="lesson-card">
            <h2>2. බිම් මැනුමකදි ඔබ දැනගන්නම ඕනි දෙවල් මෙන්න..! (Building Materials & Structures)</h2>
           
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/8yIbsjWRXJE?si=ONoWQkWGtsycLzZn" allowfullscreen></iframe>
            </div>
        </div>

    </div>

</body>
</html>
